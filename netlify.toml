# Netlify config for Octopus Floor (Next.js 14 App Router)
# Netlify auto-detects Next.js and installs @netlify/plugin-nextjs.
# This file makes the build settings explicit so nothing surprises us.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Security headers — sensible defaults for a brutalist marketing-style web app
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=()"
